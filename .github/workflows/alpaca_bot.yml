name: Alpaca Day Trading Bot

on:
  schedule:
    # Every 5 minutes, 13:25–20:05 UTC = 9:25 AM–4:05 PM ET (Mon–Fri)
    # Bot's own time checks filter to 09:45–15:30 ET trading window.
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub UI

permissions:
  contents: write      # Needed to commit state back to repo

# Cancel any queued run the moment a newer one is ready.
concurrency:
  group: alpaca-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # Normal run is <60s; hard cap prevents stalls

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PowerShell
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y powershell

      - name: Run Alpaca bot scan
        shell: pwsh
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: pwsh ./alpaca_bot.ps1 -Once

      - name: Generate dashboard
        shell: pwsh
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: pwsh ./alpaca_dashboard_html.ps1 -GenerateOnly

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-dashboard
          path: alpaca_dashboard.html
          retention-days: 7

      - name: Persist state to repo
        run: |
          git config user.name  "alpaca-bot[bot]"
          git config user.email "alpaca-bot@users.noreply.github.com"
          git add -f alpaca_state.json alpaca_dashboard.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "alpaca: state + dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true

