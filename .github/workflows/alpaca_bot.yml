name: Alpaca Day Trading Bot

on:
  schedule:
    # Backup cron — GitHub scheduler is unreliable; primary trigger is
    # the external cron-job.org pinger via repository_dispatch below.
    - cron: '0,20,40 13-20 * * 1-5'
  workflow_dispatch:        # Manual trigger from GitHub UI
  repository_dispatch:      # External trigger via GitHub API (cron-job.org)
    types: [run-bot]

permissions:
  contents: write      # Needed to commit state back to repo

# Opt into Node.js 24 now — GitHub forces this on June 2 2026 anyway.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Do NOT use cancel-in-progress — it causes runner starvation on free tier.
# Instead let each run complete; the bot itself is idempotent.
concurrency:
  group: alpaca-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # Hard cap — fail fast if runner stalls

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PowerShell
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y powershell

      - name: Run Alpaca bot scan
        shell: pwsh
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: pwsh ./alpaca_bot.ps1 -Once

      - name: Generate dashboard
        shell: pwsh
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: pwsh ./alpaca_dashboard_html.ps1 -GenerateOnly

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-dashboard
          path: alpaca_dashboard.html
          retention-days: 7
          overwrite: true

      - name: Persist state to repo
        run: |
          git config user.name  "alpaca-bot[bot]"
          git config user.email "alpaca-bot@users.noreply.github.com"
          git add -f alpaca_state.json alpaca_dashboard.html alpaca_ticker_memory.json earnings_calendar.json alpaca_journal.json alpaca_review.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "alpaca: state + memory + dashboard $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push || true
